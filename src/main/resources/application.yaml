spring:
  profiles:
    # Possible values are: logstash, no-security, mock-kfreiRestApi
    active:
  application:
    name: kfrei-mvg-eai
  # Disable default error page to avoid exposing any internal information
  web:
    error:
      whitelabel:
        enabled: false
security:
  oauth2:
    # OAuth2 configuration for accessing the kfrei-mvg-eai api
    resourceserver:
      jwt:
        issuer-uri: ""
    client:
      provider:
        # OAuth2 provider for accessing the kfrei-mvg-eai web application
        kfrei-mvg-eai-web:
          issuer-uri: ""
          user-info-uri: ""
          user-name-attribute: ""
        # OAuth2 provider for accessing the KfreiRestApi
        kfrei-rest-api:
          issuer-uri: ""
      registration:
        # OAuth2 registration for accessing the kfrei-mvg-eai web application
        kfrei-mvg-eai-web:
          authorization-grant-type: ""
          client-id: ""
          client-secret: ""
          redirect-uri: ""
          scope: ""
          # OAuth2 registration for accessing the KfreiRestApi
        kfrei-rest-api:
          authorization-grant-type: ""
          client-id: ""
          client-secret: ""
          # Requires at least: roles
          scope: roles
server:
  port: 8080
  shutdown: graceful
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: liveness,readiness
app:
  kfrei-rest-api:
    base-url: http://localhost:8080/api/v2
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  packages-to-scan: de.muenchen.oss.kfreimvgeai.rest
  pathsToMatch: /api/v1/**
logging:
  level:
    de.muenchen.oss: INFO
    org.springframework: INFO
    root: WARN
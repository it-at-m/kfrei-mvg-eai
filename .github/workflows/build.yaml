name: build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-maven:
    runs-on: ubuntu-latest
    permissions:
      # required to pull repository contents
      contents: read
      # required to push container images to ghcr.io
      packages: write
    
    steps:
      # Generate safe slug values for branch names (Docker-compatible)
      - name: Generate slug variables
        uses: rlespinasse/github-slug-action@v5
      
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v6
      
      # Install JDK (with Maven cache for faster non-release builds)
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      
      # Authenticate against GitHub Container Registry (ghcr.io)
      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      
      # Build application, container image and publish it
      # Tags: branch name
      # - branch name
      # - commit SHA
      - name: Build with Maven (including image build & push)
        run: >
          mvn -B -ntp clean package
          -Pcontainer
          -Dimage.name=ghcr.io/${{ github.repository }}
          -Dimage.tag.primary=${{ env.GITHUB_REF_NAME_SLUG }}
          -Dimage.tag.sha=${{ env.GITHUB_SHA_SHORT }}
name: release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to release from"
        required: true
        default: "main"

      release-version:
        description: "Release version (e.g. 1.2.3)"
        required: true
        default: "0.0.0"

      development-version:
        description: "Next development version (e.g. 1.2.4-SNAPSHOT)"
        required: true
        default: "0.0.0-SNAPSHOT"

jobs:
  mvn-release:
    runs-on: ubuntu-latest
    permissions:
      # required to create commits and tags via Maven release plugin
      contents: write
      # required to push container images to ghcr.io
      packages: write

    steps:
      # Generate safe slug values for branch names (Docker-compatible)
      - name: Generate slug variables
        uses: rlespinasse/github-slug-action@e6f261660910b273384c5c42b17a0217881b217a # v5.6.0
      
      # Checkout the selected branch with full history (required for Maven release)
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0
      
      # Configure Git identity for commits created by the Maven release plugin
      - name: Setup Git user
        uses: fregante/setup-git-user@024bc0b8e177d7e77203b48dab6fb45666854b35 # v2.0.2
      
      # Install JDK (no Maven cache for clean, reproducible release builds)
      - name: Setup Java 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 21
          distribution: temurin
      
      # Run the full Maven release lifecycle:
      # - update versions
      # - create Git tag
      # - build from the tagged commit
      # - build and publish the container image
      - name: Perform maven release (including image build & push)
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For Maven Distribution Management
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B -ntp release:prepare release:perform
          -DreleaseVersion=${{ github.event.inputs.release-version }} 
          -DdevelopmentVersion=${{ github.event.inputs.development-version }} 
          -Dtag=v${{ github.event.inputs.release-version }} 
          -Darguments="-DskipTests -Pcontainer,container-latest \
            -Dimage.name=ghcr.io/${{ github.repository }} \
            -Dimage.tag.primary=${{ github.event.inputs.release-version }} \
            -Dimage.tag.sha=${{ env.GITHUB_SHA_SHORT }}"
      
      # Upload built artifacts so they can be used in the publish job (different runner)
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jar
          path: target/*.jar

  gh-release:
    needs: mvn-release
    runs-on: ubuntu-latest
    permissions:
      # required to create the GitHub Release and upload assets
      contents: write

    steps:
      # Checkout the repository at the created release tag
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: v${{ github.event.inputs.release-version }}

      # Create a GitHub Release and attach the built artifacts
      - name: Publish (GitHub release + artifacts)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.release-version }}
          files: target/*.jar
          draft: false
          prerelease: false
          generate_release_notes: true